<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Articles on therapy, trauma, and mental health by Hila Teller, LCSW — psychotherapist in Los Altos, CA." />
  <title>Articles — Hila Teller, LCSW</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
</head>
<body>

  <nav class="nav">
    <div class="container nav__inner">
      <button class="nav__toggle" aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav__links" id="nav-links">
        <li><a href="index.html" class="nav__link">Home</a></li>
        <li><a href="about.html" class="nav__link">About</a></li>
        <li><a href="services.html" class="nav__link">Services</a></li>
        <li><a href="contact.html" class="nav__link">Contact</a></li>
        <li><a href="articles.html" class="nav__link active">Articles</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <section class="section">
      <div class="container">
        <h1 class="section__title">Articles</h1>
        <nav class="articles-list" aria-label="Articles">
          <a href="#">How Do I Know If I need Trauma Therapy?</a>
          <a href="#">Why Do I Feel Empty When Everything Seems Fine?</a>
        </nav>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <div class="footer__left">
        <p class="footer__name">Hila Teller</p>
        <p><a href="mailto:hilatellerlcsw@gmail.com">hilatellerlcsw@gmail.com</a></p>
        <p>408-412-1517</p>
      </div>
      <div class="footer__right">
        <p>885 North San Antonio Road</p>
        <p>Los Altos, CA 94022</p>
      </div>
    </div>
  </footer>

  <script>
    const toggle = document.querySelector('.nav__toggle');
    const links  = document.getElementById('nav-links');
    toggle.addEventListener('click', () => {
      const open = toggle.getAttribute('aria-expanded') === 'true';
      toggle.setAttribute('aria-expanded', String(!open));
      links.classList.toggle('open');
    });
    links.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', () => {
        toggle.setAttribute('aria-expanded', 'false');
        links.classList.remove('open');
      });
    });
  </script>

</body>
</html>
